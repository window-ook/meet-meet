name: Preview 버전 (staging 브랜치 사용)

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches: # 병합 후 배포
      - staging
  pull_request: # 병합되기 전에 테스트
    branches:
      - staging
  workflow_dispatch: # 수동 실행 옵션

jobs:
  Sync-Fork-Repository:
    runs-on: ubuntu-latest
    # PR인 경우에는 이 작업 건너뛰기 (포크 푸시는 실제 병합 후에만 필요)
    if: github.event_name != 'pull_request'
    steps:
      - name: Github Repository 파일 가져오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 전체 히스토리 가져오기

      - name: 포크 리포지토리로 푸시
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.AUTO_ACTIONS }}
        with:
          source-directory: '.' # 전체 리포지토리 푸시
          destination-github-username: window-ook
          destination-repository-name: meet2-web
          user-email: ${{ secrets.EMAIL }}
          commit-message: ${{ github.event.commits[0].message || 'Update from team repository' }}
          target-branch: staging # 포크의 staging 브랜치로 푸시

  Deploy-Production:
    runs-on: ubuntu-latest
    # PR이거나 포크 동기화가 완료된 후에 실행
    needs: [Sync-Fork-Repository]
    # PR일 경우 Sync-Fork-Repository 작업 없이 이 작업부터 시작
    if: github.event_name == 'pull_request' || success()

    steps:
      - name: Github Repository 파일 가져오기
        uses: actions/checkout@v4

      - name: Node.js 셋업
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 10.11
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 의존성(라이브러리) 설치
        run: pnpm install

      - name: Run Tests
        run: pnpm run test || true # 테스트가 실패해도 계속 진행

      - name: Vercel CLI 설치
        run: pnpm install --global vercel@latest

      - name: Vercel 환경 정보 가져오기
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 프로젝트 빌드
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vercel에 프로젝트 배포
        if: github.event_name != 'pull_request' # PR이 아닐 때만 실제 배포 (푸시 또는 수동 실행)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vercel 프리뷰 배포 (PR인 경우)
        if: github.event_name == 'pull_request'
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
